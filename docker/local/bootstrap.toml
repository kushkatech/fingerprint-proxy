listener_acquisition_mode = "direct_bind"

[[listeners]]
bind = "0.0.0.0:443"

[[tls_certificates]]
id = "default"
certificate_pem_path = "/app/certs/default.crt"
private_key_pem_path = "/app/certs/default.key"
server_names = [
  { kind = "exact", value = "localhost" },
]

[default_certificate_policy]
kind = "reject"
