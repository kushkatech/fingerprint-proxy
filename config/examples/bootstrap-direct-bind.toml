# Bootstrap configuration for ordinary process-owned listeners.
#
# Use this mode for Kubernetes, containers, development, and bare-metal
# deployments that do not use systemd socket activation.

listener_acquisition_mode = "direct_bind"

[[listeners]]
bind = "0.0.0.0:443"

[[listeners]]
bind = "[::]:443"

[[tls_certificates]]
id = "default"
certificate_pem_path = "/etc/fingerprint-proxy/certs/default.crt"
private_key_pem_path = "/etc/fingerprint-proxy/certs/default.key"
server_names = [
  { kind = "exact", value = "example.com" },
  { kind = "wildcard_suffix", value = ".example.com" },
]

[default_certificate_policy]
kind = "use_default"
id = "default"

[dynamic_provider]
kind = "file"
polling_interval_seconds = 5
upstream_connectivity_validation_mode = "disabled"

[stats_api]
enabled = true
bind = "127.0.0.1:9100"

[stats_api.network_policy]
kind = "require_allowlist"
allowlist = [
  { addr = "127.0.0.1", prefix_len = 32 },
  { addr = "::1", prefix_len = 128 },
]

[stats_api.auth_policy]
kind = "require_credentials"
bearer_tokens = ["replace-this-token"]

[timeouts]
upstream_connect_timeout_ms = 3000
request_timeout_ms = 30000

[limits]
max_header_bytes = 65536
max_body_bytes = 10485760

[module_enabled]
fingerprint_header = true
network_classification = true
forward = true
